<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#9a9a9a" />
  <meta name="description" content="Vip Lar Imobiliária — Conheça nossa equipe de corretoras e fale direto no WhatsApp." />
  <title>Vip Lar Imobiliária — Conheça nossa equipe</title>

  <link rel="icon" href="public/favicon.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="header__eyebrow">CONHEÇA NOSSA EQUIPE</p>
      <div class="header__logo">
        <img src="public/logo.png" alt="Vip Lar Imobiliária" />
      </div>
      <p class="header__subtitle">Escolha um especialista e inicie uma conversa</p>
    </header>

    <section class="team" aria-label="Equipe de corretoras">
      <!-- Os cards são gerados via JS a partir do array CORRETORAS em script.js -->
    </section>

    <footer class="footer">
      <p>© <span id="year"></span> Vip Lar Imobiliária. Todos os direitos reservados.</p>
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
